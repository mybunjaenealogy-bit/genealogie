<!DOCTYPE html>
<html lang="fr">
	<head>
		<meta charset="UTF-8">
		<title>Généalogie - Éditeur Complet</title>
		<link rel="stylesheet" href="editit.css" />
		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
	</head>
	<body>
	<div id="viewport">
		<div id="workspace">
			<canvas id="canvas-bg"></canvas>
			<div id="tree-container"></div>
		</div>
	</div>
	<div class="ui-fixed">
		<button class="btn-main" onclick="resetView()">🎯 Centrer</button>
		<button class="btn-main" onclick="saveToDatabase()">☁️ Sauvegarder Cloud</button>
		<!--<button class="btn-main" onclick="downloadJSON()">📥 Exporter Fichier</button>-->
	</div>
	<div id="modal-overlay">
		<div class="modal">
			<h3 id="modal-title" style="margin-top:0">Modifier la fiche</h3>
			<label style="font-size: 12px; color: #666;">Père :</label>
			<select id="in-father" class="modal-input"></select>
			<label style="font-size: 12px; color: #666;">Mère :</label>
			<select id="in-mother" class="modal-input"></select>
			<br/>
			<label style="font-size: 12px; color: #666;">Nom et Prénom</label>
			<input type="text" id="in-name">
			<label style="font-size: 12px; color: #666;">Année de naissance</label>
			<input type="number" id="in-birth">
			<label style="font-size: 12px; color: #666;">Année de décès (optionnel)</label>
			<input type="number" id="in-death" placeholder="Laissez vide si vivant">
			<label style="font-size: 12px; color: #666;">Lieu</label>
			<input type="text" id="in-place">
			<div class="modal-footer">
				<div id="delete-zone">
				</div>
				<div class="modal-actions-right">
					<button style="background:none; border:none; cursor:pointer; color:#666" onclick="closeModal()">Annuler</button>
					<button class="btn-main" onclick="savePerson()">Enregistrer</button>
				</div>
			</div>
		</div>
	</div>
		<script src="supabase.js"></script>
		<script src="editit.js"></script>
	</body>
</html>
